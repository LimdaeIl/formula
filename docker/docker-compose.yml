services:
  mysql:
    image: mysql:8.0
    container_name: formula-mysql
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - formula-mysql-data:/var/lib/mysql
    networks:
      - formula-network

volumes:
  formula-mysql-data:

networks:
    formula-network:
